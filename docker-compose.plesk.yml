# Plesk / Portainer — same host as the SignalForge hub stack.
#
# SignalForge (separate Portainer stack — docker-compose.plesk.yml in p7-scanner):
#   :3000  hub web   (env: CLIENT_PORT)
#   :3001  peer web  (env: CLIENT_PORT, optional second SF stack)
#
# SchedKit (this stack):
#   :3002  api        (env: SCHEDKIT_CLIENT_PORT — never CLIENT_PORT)
#
# Portainer: use a dedicated env block per stack. If you copy SF env vars into
# SchedKit, CLIENT_PORT=3000 will hijack the bind and fail against SF.
#
# Plesk proxy schedkit.net → localhost:3002
# Maintenance page (502/503 during restarts): deploy/plesk/README.md
# Images: ghcr.io/projectseven-co-ltd/schedkit-api:${IMAGE_TAG:-latest}
#
# Auto-deploy (push to main):
#   1. Portainer → SchedKit stack → Webhooks → copy stack webhook URL
#   2. GitHub repo secret: SCHEDKIT_PORTAINER_STACK_WEBHOOK_URL
#   3. CI POSTs ?IMAGE_TAG=<short-sha> after GHCR publish
#
# Plesk Portainer URL is usually one of:
#   https://projectseven.io/modules/docker/portainer/api/stacks/webhooks/<uuid>
#   https://projectseven.io/api/stacks/webhooks/<uuid>
# CI tries both. Use the SchedKit stack webhook — not SignalForge's.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-schedkit}
      POSTGRES_USER: ${POSTGRES_USER:-schedkit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-strong}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-schedkit} -d ${POSTGRES_DB:-schedkit}"]
      interval: 10s
      timeout: 3s
      retries: 10

  api:
    image: ${API_IMAGE:-${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-projectseven-co-ltd}/schedkit-api:${IMAGE_TAG:-latest}}
    container_name: schedkit-api
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
      - path: .env
        required: false
    environment:
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-schedkit}:${POSTGRES_PASSWORD:-change-me-strong}@postgres:5432/${POSTGRES_DB:-schedkit}?sslmode=disable}
      BASE_DOMAIN: ${BASE_DOMAIN:-schedkit.net}
      API_SECRET:
      PLATFORM_ADMIN_EMAILS:
      MJ_APIKEY_PUBLIC:
      MJ_APIKEY_PRIVATE:
      MJ_FROM_EMAIL:
      MJ_FROM_NAME:
      GOOGLE_CLIENT_ID:
      GOOGLE_CLIENT_SECRET:
      VAPID_PUBLIC_KEY:
      VAPID_PRIVATE_KEY:
      VAPID_SUBJECT:
      STRIPE_SECRET_KEY:
      STRIPE_WEBHOOK_SECRET:
      STRIPE_PRICE_STARTER:
      STRIPE_PRICE_AGENCY:
      NTFY_TOPIC:
      NTFY_DEFAULT_TOPIC:
      PORTAL_ORG_SLUG:
      PORTAL_ORG_NAME:
      PORTAL_ORG_OWNER_EMAIL:
      PORTAL_COOKIE_DOMAIN:
      BLESTA_AUTH_BRIDGE_URL:
      BLESTA_URL:
      BLESTA_API_USER:
      BLESTA_API_KEY:
      # MAINTENANCE_MODE: "true"
    volumes:
      - captures_data:/app/public/captures
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${SCHEDKIT_CLIENT_PORT:-3002}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  captures_data:
