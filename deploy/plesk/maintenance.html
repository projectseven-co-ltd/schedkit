<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0a0a0a">
<title>Stand down — SchedKit</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    background:#0a0a0a;color:#c9c9c9;
    font-family:'Segoe UI',system-ui,sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 20px
  }
  .card{
    max-width:520px;width:100%;background:#111;border:1px solid rgba(255,255,255,.08);
    border-radius:14px;padding:40px 36px;text-align:center
  }
  .badge{
    display:inline-block;font-family:ui-monospace,monospace;font-size:11px;
    letter-spacing:.12em;color:#ffc700;margin-bottom:18px
  }
  h1{font-size:24px;margin-bottom:10px;color:#e8e8ea}
  p{color:#777;font-size:15px;line-height:1.7}
  .mono{font-family:ui-monospace,monospace;font-size:12px;color:#555;margin-top:24px}
</style>
</head>
<body>
<div class="card">
  <div class="badge">[◷] STAND DOWN</div>
  <h1>SchedKit is updating</h1>
  <p>We're redeploying or running maintenance. The API and dashboard will be back shortly — usually under a minute.</p>
  <p class="mono">HTTP 503 · your browser will retry</p>
</div>
</body>
</html>
