# SchedKit — paste into Plesk → schedkit.net → Apache & nginx Settings
# → "Additional nginx directives" (inside the server block).
#
# Prerequisite: proxy to SchedKit API on localhost:3002 (Portainer stack).
# If Plesk already has a reverse proxy for this domain, keep that block and
# only add the error_page + maintenance location + proxy_intercept_errors lines
# inside your existing location / { ... }.

proxy_intercept_errors on;
error_page 502 503 504 /maintenance.html;

location = /maintenance.html {
    root /var/www/vhosts/schedkit.net/httpdocs;
    internal;
    default_type text/html;
    add_header Retry-After "120" always;
    add_header Cache-Control "no-store" always;
}

# Use this location / ONLY if schedkit.net is not already proxied to :3002.
# If you already proxy via Plesk "Docker" or "Proxy mode", merge the three
# directives above into that existing location instead of duplicating location /.

location / {
    proxy_pass http://127.0.0.1:3002;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_connect_timeout 5s;
    proxy_read_timeout 120s;
    proxy_intercept_errors on;
}
