name: Docker Publish

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

jobs:
  publish-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ vars.SCHEDKIT_IMAGE_NAMESPACE || github.repository_owner }}/schedkit-api
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push SchedKit API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs: [publish-api]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger SchedKit Portainer stack webhook
        env:
          SCHEDKIT_PORTAINER_STACK_WEBHOOK_URL: ${{ secrets.SCHEDKIT_PORTAINER_STACK_WEBHOOK_URL }}
        run: |
          export DEPLOY_TAG="${GITHUB_SHA:0:7}"
          bash .github/scripts/trigger-portainer-webhook.sh \
            SCHEDKIT_PORTAINER_STACK_WEBHOOK_URL \
            "$SCHEDKIT_PORTAINER_STACK_WEBHOOK_URL" \
            false
