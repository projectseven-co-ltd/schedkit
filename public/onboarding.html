<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/brand/logo-icon.svg">
<meta property="og:image" content="https://schedkit.net/brand/logo-icon.svg">
<meta property="og:site_name" content="SchedKit">
<meta name="theme-color" content="#0a0a0a">
<title>Welcome to SchedKit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="/theme.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:var(--bg);--surface:var(--surface);--border:var(--border);--accent:var(--accent);--text:var(--text);--muted:var(--muted);--red:var(--red);--font-sans:'Space Grotesk',sans-serif;--font-mono:'Fira Code',monospace}
  [data-lights="on"]{--bg:#f5f4ef;--surface:#edecea;--border:rgba(0,0,0,0.1);--accent:var(--accent);--text:#141410;--muted:#5a5a4a}
  body{background:var(--bg);color:var(--text);font-family:var(--font-sans);min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:48px 40px;width:100%;max-width:440px;position:relative;overflow:hidden}
  .card::before{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:160px;height:1px;background:var(--accent);box-shadow:0 0 20px 2px rgba(255,199,0,0.25)}
  .logo{display:flex;align-items:center;gap:10px;font-family:var(--font-mono);color:var(--accent);font-size:20px;margin-bottom:8px}
  .logo span{color:var(--muted)}
  h1{font-size:22px;font-weight:700;margin-bottom:8px}
  p{color:var(--muted);font-size:14px;margin-bottom:28px;line-height:1.6}
  label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
  input,select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:8px;font-family:var(--font-sans);font-size:14px;transition:border-color .15s;margin-bottom:16px}
  input:focus,select:focus{outline:none;border-color:var(--accent)}
  [data-lights="on"] input,[data-lights="on"] select{background:var(--bg)}
  .btn{width:100%;background:var(--accent);color:var(--bg);border:none;padding:13px;border-radius:8px;font-family:var(--font-sans);font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s}
  .btn:hover{opacity:.88}
  .btn:disabled{opacity:.4;cursor:default}
  .err{color:var(--red);font-size:13px;margin-bottom:12px;display:none}
  .lights-btn{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:var(--font-mono);font-size:0.62rem;letter-spacing:0.08em;cursor:pointer;transition:all .2s;align-self:center;width:fit-content}
  .lights-btn:hover{border-color:var(--accent);color:var(--accent)}
/* ── NITE MODE ── */
[data-lights="nite"]{
  --bg:#0d0000;--surface:#130000;--surface2:#1a0000;--border:#2a0000;
  --accent:#ff3300;--accent-dim:rgba(255,51,0,0.08);--accent-border:rgba(255,51,0,0.2);
  --text:#ffaa88;--muted:#662200;--red:#ff4400;--green:#882200;
  filter:brightness(0.65);
}
/* ── NVG MODE ── */
[data-lights="nvg"]{
  --bg:#000508;--surface:#010c12;--surface2:#021018;--border:#031820;
  --accent:#4a7a8a;--accent-dim:rgba(74,122,138,0.06);--accent-border:rgba(74,122,138,0.12);
  --text:#4a7a8a;--muted:#1e3a44;--red:#2a5a6a;--green:#2a5a6a;
  filter:brightness(0.3) saturate(0.15);
}
</style>
</head>
<body>
<div class="card">
  <div class="logo" style="display:flex;align-items:center;gap:10px;"><svg width="32" height="32" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><rect width="512" height="512" rx="96" fill="var(--bg)"/><line x1="128" y1="96" x2="208" y2="416" stroke="var(--accent)" stroke-width="72" stroke-linecap="round"/><line x1="272" y1="96" x2="352" y2="416" stroke="var(--accent)" stroke-width="72" stroke-linecap="round"/></svg> sched<span>kit</span></div>
  <h1>Welcome! Let's set up your account</h1>
  <p>You've been invited to SchedKit. Just fill in a couple of details and you're good to go.</p>
  <form id="form">
    <label for="name">Your full name</label>
    <input type="text" id="name" placeholder="Jane Smith" required autofocus>
    <label for="timezone">Your timezone</label>
    <select id="timezone"></select>
    <div class="err" id="err"></div>
    <button type="submit" class="btn" id="btn">Get started →</button>
  </form>
</div>
<button class="lights-btn" id="lightsBtn"><span>[◑]</span><span id="lightsBtnLabel">LIGHTS ON</span></button>
<div id="lightsFlicker"></div>
<script>
  (function(){
    const TACTICAL=['dark','nite','nvg'];
    const MLABELS={dark:'NITE',day:'DARK',nite:'NVG',nvg:'DARK'};
    const MSIGILS={dark:'[◑]',day:'[☀]',nite:'[▌]',nvg:'[◈]'};
    let stored=localStorage.getItem('p7-display-mode')||'dark';
    if(stored==='off'||stored==='on')stored=stored==='on'?'day':'dark';
    let mode=['dark','day','nite','nvg'].includes(stored)?stored:'dark',_preDay='dark';
    function applyMode(m){
      mode=m;document.documentElement.setAttribute('data-lights',m);
      localStorage.setItem('p7-display-mode',m);
      document.querySelectorAll('#lightsBtnLabel,#lightsBtnLabelMobile').forEach(el=>el.textContent=MLABELS[m]||'DARK');
      document.querySelectorAll('.lights-btn').forEach(b=>{const ic=b.querySelector('span:first-child');if(ic&&!ic.classList.contains('phosphor-dot'))ic.textContent=MSIGILS[m]||'[◑]';});
    }
    applyMode(mode);
    document.querySelectorAll('.lights-btn').forEach(b=>{
      let _t=null;
      b.addEventListener('pointerdown',()=>{_t=setTimeout(()=>{_t=null;if(mode==='day')applyMode(_preDay);else{_preDay=mode;applyMode('day');}},500);});
      b.addEventListener('pointerup',()=>{if(!_t)return;clearTimeout(_t);_t=null;if(mode==='day')applyMode(_preDay);else applyMode(TACTICAL[(TACTICAL.indexOf(mode)+1)%TACTICAL.length]);});
      b.addEventListener('pointercancel',()=>{clearTimeout(_t);_t=null;});
      b.addEventListener('contextmenu',e=>e.preventDefault());
    });
  })();
</script>
</body>
</html>
