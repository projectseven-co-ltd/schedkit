<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/brand/logo-icon.svg">
<meta property="og:image" content="https://schedkit.net/brand/logo-icon.svg">
<meta property="og:site_name" content="SchedKit">
<meta name="theme-color" content="#0a0a0a">
<title>SchedKit — Login</title>
<link rel="stylesheet" href="/theme.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--font-sans:'Space Grotesk',sans-serif;--font-mono:'Fira Code',monospace}
  [data-lights="on"] input{background:var(--bg)}
  body{background:var(--bg);color:var(--text);font-family:var(--font-sans);min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
  .lights-btn{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:var(--font-mono);font-size:0.62rem;letter-spacing:0.08em;cursor:pointer;transition:all .2s;align-self:center;width:fit-content}
  .lights-btn:hover{border-color:var(--accent);color:var(--accent)}
  #lightsFlicker{position:fixed;inset:0;z-index:9999;pointer-events:none;background:rgba(255,255,230,0)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:48px 40px;width:100%;max-width:400px;position:relative;overflow:hidden}
  .card::before{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:160px;height:1px;background:var(--accent);box-shadow:0 0 20px 2px rgba(255,199,0,0.25)}
  .logo{display:flex;align-items:center;gap:10px;font-family:var(--font-mono);color:var(--accent);font-size:20px;margin-bottom:8px}
  .logo span{color:var(--muted)}
  h1{font-size:22px;font-weight:700;margin-bottom:8px}
  p{color:var(--muted);font-size:14px;margin-bottom:32px;line-height:1.6}
  label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
  .form-row{margin-bottom:16px}
  input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:8px;font-family:var(--font-sans);font-size:14px;transition:border-color .15s}
  input:focus{outline:none;border-color:var(--accent)}
  button{width:100%;background:var(--accent);color:var(--on-accent);border:none;padding:13px;border-radius:8px;font-family:var(--font-sans);font-size:15px;font-weight:700;cursor:pointer;margin-top:16px;transition:opacity .15s}
  button:hover{opacity:.88}
  button:disabled{opacity:.4;cursor:default}
  .msg{margin-top:16px;font-size:13px;text-align:center;display:none}
  .msg.ok{color:var(--accent)}
  .msg.err{color:var(--red)}
  .dashboard-link{text-align:center;margin-top:20px;font-size:13px;color:var(--muted)}
  .dashboard-link a{color:var(--accent);text-decoration:none}
  .dashboard-link a:hover{text-decoration:underline}
  .divider{display:flex;align-items:center;gap:12px;margin:24px 0 20px;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
  .mode-link{background:none;border:none;color:var(--accent);font-size:13px;cursor:pointer;margin-top:12px;width:100%;padding:0}
  .mode-link:hover{text-decoration:underline}
  .hidden{display:none!important}
</style>
</head>
<body>
<div class="card">
  <div class="logo" style="display:flex;align-items:center;gap:10px;"><svg width="32" height="32" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><rect width="512" height="512" rx="96" fill="#0a0a0a"/><line x1="128" y1="96" x2="208" y2="416" stroke="#ffc700" stroke-width="72" stroke-linecap="round"/><line x1="272" y1="96" x2="352" y2="416" stroke="#ffc700" stroke-width="72" stroke-linecap="round"/></svg> sched<span>kit</span></div>
  <h1 id="loginHeading">Sign in</h1>
  <p id="introCopy">Enter your email and we'll send you a magic link. On iPhone, you can also enter the 6-digit code from the email directly in the app.</p>
  <div class="form-row" style="margin-bottom:0">
    <label for="email">Email address</label>
    <input type="email" id="email" placeholder="you@example.com" required autofocus autocomplete="email">
  </div>
  <form id="passwordForm" class="hidden">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Your password" autocomplete="current-password">
    <button type="submit" id="passwordBtn">Sign in →</button>
    <button type="button" class="mode-link" id="showMagicLink">Use magic link instead</button>
  </form>
  <form id="form">
    <button type="submit" id="btn">Send magic link →</button>
    <button type="button" class="mode-link hidden" id="showPassword">Sign in with password instead</button>
  </form>
  <form id="codeForm" style="display:none">
    <label for="code">6-digit code</label>
    <input type="text" id="code" placeholder="123456" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="one-time-code">
    <button type="submit" id="codeBtn">Log in with code →</button>
  </form>
  <div class="msg ok" id="ok">✓ Check your email — link expires in 15 minutes.</div>
  <div class="msg err" id="err">Something went wrong. Try again.</div>
  <div class="dashboard-link" id="dash-link" style="display:none">
    Already signed in? <a href="/dashboard">Go to dashboard →</a>
  </div>
</div>
<button class="lights-btn" id="lightsBtn"><span>[◑]</span><span id="lightsBtnLabel">LIGHTS ON</span></button>
<div id="lightsFlicker"></div>
<script>
// Validate ?next — force same-origin by parsing through URL constructor
function safeRedirect(path) {
  try {
    const url = new URL(path, window.location.origin);
    if (url.origin !== window.location.origin) return '/dashboard';
    return url.pathname + url.search + url.hash;
  } catch { return '/dashboard'; }
}
const _nextUrl = safeRedirect(new URLSearchParams(window.location.search).get('next') || '/dashboard');
const _isUpgrade = _nextUrl.includes('upgrade=');
if (_isUpgrade) {
  document.getElementById('loginHeading').textContent = 'Create your account';
  document.getElementById('introCopy').textContent = 'Enter your email to get started. We\'ll send you a magic link — no password needed.';
}
(async () => {
  try {
    const res = await fetch('/v1/auth/me', { credentials: 'include' });
    if (res.ok) { window.location.replace(_nextUrl); return; }
  } catch {}
  document.getElementById('dash-link').style.display = 'block';
})();
const form = document.getElementById('form');
const passwordForm = document.getElementById('passwordForm');
const codeForm = document.getElementById('codeForm');
const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');
const codeInput = document.getElementById('code');
const introCopy = document.getElementById('introCopy');
const showPasswordBtn = document.getElementById('showPassword');
const showMagicLinkBtn = document.getElementById('showMagicLink');
let passwordLoginEnabled = false;

function setLoginMode(mode) {
  const usePassword = mode === 'password';
  passwordForm.classList.toggle('hidden', !usePassword);
  form.classList.toggle('hidden', usePassword);
  codeForm.style.display = 'none';
  document.getElementById('ok').style.display = 'none';
  document.getElementById('err').style.display = 'none';
  if (usePassword) {
    introCopy.textContent = 'Sign in with the email and password for your SchedKit account.';
    passwordInput.focus();
  } else if (!_isUpgrade) {
    introCopy.textContent = 'Enter your email and we\'ll send you a magic link. On iPhone, you can also enter the 6-digit code from the email directly in the app.';
    emailInput.focus();
  }
}

showPasswordBtn.addEventListener('click', () => setLoginMode('password'));
showMagicLinkBtn.addEventListener('click', () => setLoginMode('magic'));

(async () => {
  try {
    const res = await fetch('/v1/auth/capabilities');
    if (res.ok) {
      const caps = await res.json();
      passwordLoginEnabled = !!caps.passwordLoginEnabled;
      if (passwordLoginEnabled && !_isUpgrade) {
        showPasswordBtn.classList.remove('hidden');
      }
    }
  } catch {}
})();

passwordForm.addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('passwordBtn');
  const ok = document.getElementById('ok');
  const err = document.getElementById('err');
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  if (!email || !password) {
    err.textContent = 'Enter your email and password.';
    err.style.display = 'block';
    return;
  }
  btn.disabled = true; btn.textContent = 'Signing in...';
  ok.style.display = err.style.display = 'none';
  try {
    const res = await fetch('/v1/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email, password, next: _nextUrl !== '/dashboard' ? _nextUrl : undefined }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.ok) {
      if (data.error === 'invalid_credentials') throw new Error('invalid');
      throw new Error(data.error || 'login_failed');
    }
    window.location.replace(safeRedirect(data.destination || _nextUrl));
  } catch {
    err.textContent = 'Invalid email or password. Use a magic link if you have not set a password yet.';
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign in →';
  }
});

form.addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const ok = document.getElementById('ok');
  const err = document.getElementById('err');
  btn.disabled = true; btn.textContent = 'Sending...';
  ok.style.display = err.style.display = 'none';
  try {
    const res = await fetch('/v1/auth/magic', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email: emailInput.value, next: _isUpgrade ? _nextUrl : undefined }),
    });
    if (!res.ok) throw new Error();
    ok.textContent = '✓ Check your email — use the magic link or enter the 6-digit code below.';
    ok.style.display = 'block';
    form.style.display = 'none';
    codeForm.style.display = 'block';
    introCopy.textContent = 'Magic link sent. If the link opens outside the app, enter the 6-digit code from the email here.';
    codeInput.focus();
  } catch {
    err.textContent = 'Something went wrong. Try again.';
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Send magic link →';
  }
});

codeForm.addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('codeBtn');
  const ok = document.getElementById('ok');
  const err = document.getElementById('err');
  const code = codeInput.value.replace(/\D/g, '').slice(0, 6);
  if (code.length !== 6) {
    err.textContent = 'Enter the full 6-digit code.';
    err.style.display = 'block';
    return;
  }
  btn.disabled = true; btn.textContent = 'Logging in...';
  ok.style.display = err.style.display = 'none';
  try {
    const res = await fetch('/v1/auth/verify-code', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      credentials: 'include',
      body: JSON.stringify({ email: emailInput.value, code, next: _nextUrl !== '/dashboard' ? _nextUrl : undefined }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.ok) throw new Error(data.error || 'invalid_code');
    window.location.replace(safeRedirect(data.destination || _nextUrl));
  } catch {
    err.textContent = 'Invalid or expired code. Request a new email and try again.';
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Log in with code →';
  }
});

codeInput.addEventListener('input', () => {
  codeInput.value = codeInput.value.replace(/\D/g, '').slice(0, 6);
});
</script>



  <script>
  // Tactical cycle (click): dark→nite→nvg→dark (NVG-safe, never passes through day)
  // Day mode (long-press 500ms): toggle day — desk use only
  (function(){
    const TACTICAL=['dark','nite','nvg'];
    const MLABELS={dark:'NITE',day:'DARK',nite:'NVG',nvg:'DARK'};
    const MSIGILS={dark:'[◑]',day:'[☀]',nite:'[▌]',nvg:'[◈]'};
    let stored=localStorage.getItem('p7-display-mode')||'dark';
    if(stored==='off'||stored==='on')stored=stored==='on'?'day':'dark';
    let mode=['dark','day','nite','nvg'].includes(stored)?stored:'dark';
    let _preDay='dark';
    function applyMode(m){
      mode=m;document.documentElement.setAttribute('data-lights',m);
      localStorage.setItem('p7-display-mode',m);
      document.querySelectorAll('#lightsBtnLabel,#lightsBtnLabelMobile').forEach(el=>el.textContent=MLABELS[m]||'DARK');
      document.querySelectorAll('.lights-btn').forEach(b=>{const ic=b.querySelector('span:first-child');if(ic&&!ic.classList.contains('phosphor-dot'))ic.textContent=MSIGILS[m]||'[◑]';});
    }
    applyMode(mode);
    document.querySelectorAll('.lights-btn').forEach(b=>{
      let _t=null;
      b.addEventListener('pointerdown',()=>{_t=setTimeout(()=>{_t=null;if(mode==='day')applyMode(_preDay);else{_preDay=mode;applyMode('day');}},500);});
      b.addEventListener('pointerup',()=>{if(!_t)return;clearTimeout(_t);_t=null;if(mode==='day')applyMode(_preDay);else applyMode(TACTICAL[(TACTICAL.indexOf(mode)+1)%TACTICAL.length]);});
      b.addEventListener('pointercancel',()=>{clearTimeout(_t);_t=null;});
      b.addEventListener('contextmenu',e=>e.preventDefault());
    });
  })();
</script>
</body>
</html>
