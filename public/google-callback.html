<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Connecting…</title>
<style>body{margin:0;background:#0a0a0b;color:#dfff00;font-family:'Fira Code',monospace;display:flex;align-items:center;justify-content:center;height:100vh;font-size:14px}</style>
</head>
<body>
<div id="msg">Connecting calendar…</div>
<script>
(async () => {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state');
  const error = params.get('error');

  if (error) { window.location.href = '/dashboard?cal_error=' + error + '#account'; return; }
  if (!code || !state) { window.location.href = '/dashboard?cal_error=missing_params#account'; return; }

  try {
    const res = await fetch('/v1/auth/google/exchange', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ code, state }),
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = '/dashboard?cal_connected=1';
    } else {
      window.location.href = '/dashboard?cal_error=' + (data.error || 'unknown') + '#account';
    }
  } catch(e) {
    window.location.href = '/dashboard?cal_error=network#account';
  }
})();
</script>
</body>
</html>
