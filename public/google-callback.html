<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Connecting…</title>
<style>body{margin:0;background:#0a0a0b;color:#dfff00;font-family:'Fira Code',monospace;display:flex;align-items:center;justify-content:center;height:100vh;font-size:14px}</style>
</head>
<body>
<div id="msg">Connecting calendar…</div>
<script>
(async () => {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state');
  const error = params.get('error');

  const msg = document.getElementById('msg');

  if (error) { window.location.href = '/dashboard?cal_error=' + error; return; }
  if (!code || !state) {
    msg.textContent = 'Error: missing params. code=' + code + ' state=' + (state ? 'ok' : 'null');
    console.error('missing params', { code, state, search: window.location.search });
    setTimeout(() => { window.location.href = '/dashboard?cal_error=missing_params'; }, 3000);
    return;
  }

  msg.textContent = 'Exchanging token…';

  try {
    const res = await fetch('/v1/auth/google/exchange', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ code, state }),
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = '/dashboard?cal_connected=1';
    } else {
      msg.textContent = 'Error: ' + res.status + ' — ' + (data.error || JSON.stringify(data));
      console.error('exchange error', res.status, data);
      setTimeout(() => { window.location.href = '/dashboard?cal_error=' + (data.error || 'unknown'); }, 3000);
    }
  } catch(e) {
    msg.textContent = 'Network error: ' + e.message;
    console.error('exchange network error', e);
    setTimeout(() => { window.location.href = '/dashboard?cal_error=network'; }, 3000);
  }
})();
</script>
</body>
</html>
