<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/brand/logo-icon.svg">
<meta property="og:image" content="https://schedkit.net/brand/logo-icon.svg">
<meta property="og:site_name" content="SchedKit">
<meta name="theme-color" content="#0a0a0a">
<title>404 — SchedKit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="/theme.css">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:var(--bg);--surface:var(--surface);--border:var(--border);--accent:var(--accent);--text:var(--text);--muted:var(--muted);--font-mono:'Fira Code',monospace}
  [data-lights="on"]{--bg:#f5f4ef;--surface:#edecea;--border:rgba(0,0,0,0.12);--accent:var(--accent);--text:#141410;--muted:#6a6a5a}

  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--font-mono);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 24px}

  .terminal{width:100%;max-width:560px}

  .prompt{color:var(--accent);font-size:14px;margin-bottom:24px;white-space:nowrap;overflow:hidden}
  .prompt .dim{color:var(--muted)}

  .output{font-size:14px;line-height:2;margin-bottom:32px}
  .output .label{color:var(--muted);display:inline-block;width:120px}
  .output .val{color:var(--text)}
  .output .val.hi{color:var(--accent)}
  .output .err{color:var(--red)}

  .divider{border:none;border-top:1px solid var(--border);margin:24px 0}

  .actions{display:flex;gap:20px;font-size:13px}
  .actions a{color:var(--accent);text-decoration:none;display:inline-flex;align-items:center;gap:6px}
  .actions a::before{content:'›';color:var(--muted)}
  .actions a:hover{text-decoration:underline}

  .cursor{display:inline-block;width:9px;height:1.1em;background:var(--accent);vertical-align:text-bottom;animation:blink .9s step-end infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

  /* type-in animation */
  .prompt{animation:typeIn .6s steps(40,end) both}
  @keyframes typeIn{from{width:0}to{width:100%}}
</style>
</head>
<body>
<div class="terminal">
  <div class="prompt"><span class="dim">schedkit@srv:~$</span> resolve <span id="pathout"></span></div>
  <div class="output">
    <div><span class="label">status</span><span class="val err">404 NOT FOUND</span></div>
    <div><span class="label">path</span><span class="val" id="pathval">—</span></div>
    <div><span class="label">message</span><span class="val">no route matched this request</span></div>
    <div><span class="label">hint</span><span class="val hi">check the URL and try again</span></div>
  </div>
  <hr class="divider">
  <div class="actions">
    <a href="/">home</a>
    <a href="/login">log in</a>
    <a href="/dashboard">dashboard</a>
  </div>
  <div style="margin-top:32px;font-size:13px;color:var(--muted)"><span class="cursor"></span></div>
</div>
<script>
(function(){
  const stored = localStorage.getItem('p7-lights');
  const on = stored === '1' || (stored === null && window.matchMedia?.('(prefers-color-scheme: light)').matches);
  document.documentElement.setAttribute('data-lights', on ? 'on' : 'off');
  const p = window.location.pathname;
  document.getElementById('pathout').textContent = p;
  document.getElementById('pathval').textContent = p;
})();
</script>
</body>
</html>
