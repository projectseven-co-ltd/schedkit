<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0a0a0a">
<title>Stand down — SchedKit</title>
<link rel="stylesheet" href="/theme.css">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 20px}
  .card{max-width:520px;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:40px 36px;text-align:center}
  .badge{display:inline-block;font-family:'Fira Code',monospace;font-size:11px;letter-spacing:.12em;color:var(--accent);margin-bottom:18px}
  h1{font-size:24px;margin-bottom:10px}
  p{color:var(--muted);font-size:15px;line-height:1.7}
  .mono{font-family:'Fira Code',monospace;font-size:12px;color:var(--muted);margin-top:24px}
</style>
</head>
<body>
<div class="card">
  <div class="badge">[◷] STAND DOWN</div>
  <h1>SchedKit is updating</h1>
  <p>We're redeploying or running maintenance. The API and dashboard will be back shortly — usually under a minute.</p>
  <p class="mono">HTTP 503 · retry automatically</p>
</div>
</body>
</html>
