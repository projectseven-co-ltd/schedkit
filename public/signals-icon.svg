  <path d="M 316 256 A 60 60 0 0 0 256 196" stroke="#00ffcc" stroke-width="28" fill="none" stroke-linecap="round"/>
  <!-- Middle wave -->
  <path d="M 152 256 A 104 104 0 0 1 256 152" stroke="#00ffcc" stroke-width="24" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 360 256 A 104 104 0 0 0 256 152" stroke="#00ffcc" stroke-width="24" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Outer wave -->
  <path d="M 108 256 A 148 148 0 0 1 256 108" stroke="#00ffcc" stroke-width="20" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M 404 256 A 148 148 0 0 0 256 108" stroke="#00ffcc" stroke-width="20" fill="none" stroke-linecap="round" opacity="0.4"/>
