<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark terminal background -->
  <rect width="512" height="512" rx="96" fill="#070e0d"/>
  <!-- Outer ring (dim) -->
  <circle cx="256" cy="256" r="180" stroke="#00ffcc" stroke-width="6" fill="none" opacity="0.18"/>
  <!-- Middle ring -->
  <circle cx="256" cy="256" r="120" stroke="#00ffcc" stroke-width="6" fill="none" opacity="0.35"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="60" stroke="#00ffcc" stroke-width="8" fill="none" opacity="0.65"/>
  <!-- Cross-hairs -->
  <line x1="256" y1="56" x2="256" y2="136" stroke="#00ffcc" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <line x1="256" y1="376" x2="256" y2="456" stroke="#00ffcc" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <line x1="56" y1="256" x2="136" y2="256" stroke="#00ffcc" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <line x1="376" y1="256" x2="456" y2="256" stroke="#00ffcc" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <!-- Center pulse dot -->
  <circle cx="256" cy="256" r="28" fill="#00ffcc"/>
  <circle cx="256" cy="256" r="14" fill="#070e0d"/>
  <circle cx="256" cy="256" r="6" fill="#00ffcc"/>
</svg>
